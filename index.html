<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <!-- LINK TO YOUR STYLE.CSS FILE -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="login-container">
        <!-- Colorful username text centered in the document card -->
        <div class="colorful-header">Login</div>

        <!-- The login form -->
        <form id="loginform">
            <label for="username">Username</label>
            <input type="text" id="username" required autocomplete="off">
            
            <label for="password">Password</label>
            <input type="password" id="password" required>
            
            <button type="submit">Login</button>
        </form>

        <p id="error" style="display: none;">Invalid username or password.</p>
    </div>

    <script>
    document.getElementById('loginform').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const nameInput = document.getElementById('username').value;
        const passInput = document.getElementById('password').value;
        
        // Match exact credentials
        if (nameInput === "Dishant" && passInput === "Dishant261") {
            sessionStorage.setItem("isLoggedIn", "true");
            window.location.href = "wish.html?name=" + encodeURIComponent(nameInput);
        } else {
            document.getElementById('error').style.display = "block";
        }
    });
    </script>

</body>
</html>
