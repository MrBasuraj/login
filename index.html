<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <!-- LINK TO YOUR STYLE.CSS FILE -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="login-container">
        <!-- Colorful username text centered in the document card -->
        <div class="colorful-header">Login</div>

        <!-- The login form -->
        <form id="loginform">
            <label for="username">Username</label>
            <input type="text" id="username" required autocomplete="off">
            
            <label for="password">Password</label>
<div style="position: relative; width: 100%; display: block;">
    <input type="password" id="password" required style="width: 100%; padding-right: 40px; box-sizing: border-box;">
    <span id="togglePassword" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; user-select: none; line-height: 1;">👁</span>
</div>


            
            <button type="submit">Login</button>
        </form>

        <p id="error" style="display: none;">Invalid username or password.</p>
    </div>

    <script>
        
// 2. Password visibility eye-toggle logic
const passwordInput = document.getElementById('password');
const toggleIcon = document.getElementById('togglePassword');

if (toggleIcon && passwordInput) {
    toggleIcon.addEventListener('click', function() {
        if (passwordInput.type === "password") {
            passwordInput.type = "text";
            toggleIcon.textContent = "🚫"; // Shown when the password text is visible
        } else {
            passwordInput.type = "password";
            toggleIcon.textContent = "👁"; // Shown when the password text is hidden
        }
    });
}

// 3. Login Verification handler
document.getElementById('loginform').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const nameInput = document.getElementById('username').value.trim();
    const passInput = document.getElementById('password').value;
    
    // Scan your local array list to find a matching user
    const userFound = validUsers.find(user => user.u === nameInput && user.p === passInput);
    
    if (userFound) {
        sessionStorage.setItem("isLoggedIn", "true");
        
        
        // Instantly forward them to wish.html passing their name and Instagram parameters
        window.location.href = "wish.html?name=" + encodeURIComponent(nameInput) + "&insta=" + encodeURIComponent(instagramLink);
    } else {
        // Display the standard incorrect login text error block
        document.getElementById('error').style.display = "block";
    }
});

    </script>

</body>
</html>
