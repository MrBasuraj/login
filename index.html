<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <!-- LINK TO YOUR STYLE.CSS FILE -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="login-container">
        <!-- Colorful username text centered in the document card -->
        <div class="colorful-header">Login</div>

        <!-- The login form -->
        <form id="loginform">
            <label for="username">Username</label>
            <input type="text" id="username" required autocomplete="off">
            
            <label for="password">Password</label>
<div style="position: relative; width: 100%; display: block;">
    <input type="password" id="password" required style="width: 100%; padding-right: 40px; box-sizing: border-box;">
    <span id="togglePassword" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; user-select: none; line-height: 1;">👁</span>
</div>


            
            <button type="submit">Login</button>
        </form>

        <p id="error" style="display: none;">Invalid username or password.</p>
    </div>

    <script>
        const passwordInput = document.getElementById('password');
const toggleIcon = document.getElementById('togglePassword');

toggleIcon.addEventListener('click', function() {
    if (passwordInput.type === "password") {
        passwordInput.type = "text";
        toggleIcon.textContent = "🚫"; // Changes to open/modified eye when password is shown
    } else {
        passwordInput.type = "password";
        toggleIcon.textContent = "👁"; // Changes back to default eye when hidden
    }
});

    // List of allowed users - you can easily add or edit entries here
    const validUsers = [
        { u: "Dishant", p: "Dishant261" },
        { u: "Basuraj", p: "Basuraj36" },
        { u: "Manav", p: "Manav183" },
        { u: "Prince", p: "Prince" },
        { u: "Bhavya", p: "Bhavya263" },
        { u: "Priya", p: "Pranav2510" }
    ];

    document.getElementById('loginform').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const nameInput = document.getElementById('username').value;
        const passInput = document.getElementById('password').value;
        
        // Checks if the entered credentials match any user in the array
        const userFound = validUsers.find(user => user.u === nameInput && user.p === passInput);
        
        if (userFound) {
            sessionStorage.setItem("isLoggedIn", "true");
            window.location.href = "wish.html?name=" + encodeURIComponent(nameInput);
        } else {
            document.getElementById('error').style.display = "block";
        }
    });
    </script>

</body>
</html>
