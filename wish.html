
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greetings</title>
    
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            min-height: 100dvh;   
            background-color: #0af7b4; 
            display: flex;
            flex-direction: column; 
            justify-content: center;
            align-items: center;    
            text-align: center;     
            gap: 20px;            
            padding: 20px;        
            box-sizing: border-box;
            font-family: sans-serif; 
            color: white; 
        }
        .wishes { color: #000000; font-weight: bold; }
        .hey { color: #000000; font-weight: bold; }
        .greetings { color: #000000; font-weight: bold; font-size: 1.2rem; }
        .status { color: #330000; font-weight: bold; font-size: 0.9rem; max-width: 300px; }
    </style>
</head>
<body>

    <div class="wishes" id="wishesBlock">Best Wishes, User! ✨</div>
    <div class="hey" id="heyBlock">Hey User</div>
    <div class="greetings">Greetings From Basuraj</div>
    <div class="status">Your Login is Successful please wait... Your Content is Under Construction</div>

    <script>
    // Extract ONLY the logged-in user name from the URL string
    const urlParams = new URLSearchParams(window.location.search);
    let username = urlParams.get('name');

    /* --- LOGIN CHECK RESTRICTION --- */
    if (!username || username.trim() === "") {
        window.location.href = "index.html";
    }

    // Explicitly update individual text blocks with current logged-in name
    document.getElementById('wishesBlock').innerText = "Best Wishes, " + username + "! ✨";
    document.getElementById('heyBlock').innerText = "Hey " + username;
    </script>
</body>
</html>
