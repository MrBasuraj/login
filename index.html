<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <!-- Link to your external style.css stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="login-container">
        <!-- Centered colorful login card header -->
        <div class="colorful-header">Login</div>

        <!-- Main credential submission form -->
        <form id="loginform">
            <label for="username">Username</label>
            <input type="text" id="username" required autocomplete="off">
            
            <label for="password">Password</label>
            <div style="position: relative; width: 100%; display: block;">
                <input type="password" id="password" required style="width: 100%; padding-right: 40px; box-sizing: border-box;">
                <span id="togglePassword" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; user-select: none; line-height: 1;">👁</span>
            </div>
            
            <button type="submit">Login</button>
        </form>

        <p id="error" style="display: none; color: red; font-weight: bold; margin-top: 10px;">Invalid username or password.</p>
    </div>

    <script>
    /* --- 1. Authorized User Database Array --- */
    const validUsers = [
        { u: "admin", p: "password123" },
        { u: "Basuraj", p: "Basu2026" },
        { u: "Dishant", p: "Dishant261" },
        { u: "Manav", p: "Manav183" }
    ];

    /* --- 2. Password Visibility Eye Toggle Logic --- */
    const passwordInput = document.getElementById('password');
    const toggleIcon = document.getElementById('togglePassword');

    if (toggleIcon && passwordInput) {
        toggleIcon.addEventListener('click', function() {
            // Reveal text characters if hidden, otherwise conceal them back
            if (passwordInput.type === "password") {
                passwordInput.type = "text";
                toggleIcon.textContent = "🚫"; // Visual cue indicating text is visible
            } else {
                passwordInput.type = "password";
                toggleIcon.textContent = "👁"; // Visual cue indicating text is hidden
            }
        });
    }

    /* --- 3. Login Verification Form Handler --- */
    document.getElementById('loginform').addEventListener('submit', function(e) {
        // Stop default browser reloads to prevent input fields from wiping out
        e.preventDefault(); 
        
        // Capture typed string credentials while stripping trailing white spaces
        const nameInput = document.getElementById('username').value.trim();
        const passInput = document.getElementById('password').value;
        
        // Suppress previous active error panels before processing next validation
        document.getElementById('error').style.display = "none";
        
        // Scan array using case-insensitive mapping for seamless username matches
        const userFound = validUsers.find(user => 
            user.u.toLowerCase() === nameInput.toLowerCase() && user.p === passInput
        );
        
        // Execute dynamic dashboard routing if account record exists
        if (userFound) {
            // Flag browser memory cache to authenticate active browsing session
            sessionStorage.setItem("isLoggedIn", "true");
            
            // Build absolute redirection path passing verified username object parameters
            const targetUrl = "wish.html?name=" + encodeURIComponent(userFound.u);
            
            // Push current window viewport to the construction dashboard
            window.location.href = targetUrl;
        } else {
            // Expose fallback failure alert banner upon matching mismatches
            document.getElementById('error').style.display = "block";
        }
    });
    </script>

</body>
</html>
