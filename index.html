<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <!-- LINK TO YOUR STYLE.CSS FILE -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="login-container">
        <!-- Colorful username text centered in the document card -->
        <div class="colorful-header">Login</div>

        <!-- The login form -->
        <form id="loginform">
            <label for="username">Username</label>
            <input type="text" id="username" required autocomplete="off">
            
            <label for="password">Password</label>
            <div style="position: relative; width: 100%; display: block;">
                <input type="password" id="password" required style="width: 100%; padding-right: 40px; box-sizing: border-box;">
                <span id="togglePassword" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; user-select: none; line-height: 1;">👁</span>
            </div>
            
            <button type="submit">Login</button>
        </form>

        <p id="error" style="display: none; color: red; font-weight: bold; margin-top: 10px;">Invalid username or password.</p>
    </div>

    <script>
    /* --- 1. DEFINE YOUR USERS ARRAY HERE --- */
    const validUsers = [
        { u: "admin", p: "password123" },
        { u: "Basuraj", p: "Basu2026" }
        { u: "Dishant", p:"Dishant261"}
        { u: "Manav", p:"Manav183"}
            
    ];

    /* --- 2. PASSWORD VISIBILITY TOGGLE --- */
    const passwordInput = document.getElementById('password');
    const toggleIcon = document.getElementById('togglePassword');

    if (toggleIcon && passwordInput) {
        toggleIcon.addEventListener('click', function() {
            if (passwordInput.type === "password") {
                passwordInput.type = "text";
                toggleIcon.textContent = "🚫"; 
            } else {
                passwordInput.type = "password";
                toggleIcon.textContent = "👁"; 
            }
        });
    }

    /* --- 3. LOGIN VERIFICATION HANDLER --- */
    document.getElementById('loginform').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const nameInput = document.getElementById('username').value.trim();
        const passInput = document.getElementById('password').value;
        
        document.getElementById('error').style.display = "none";
        
        // Scan your local array list to find a matching user
        const userFound = validUsers.find(user => user.u === nameInput && user.p === passInput);
        
        if (userFound) {
            sessionStorage.setItem("isLoggedIn", "true");
            
            // Forward to wish.html passing ONLY the username parameter
            const targetUrl = "wish.html?name=" + encodeURIComponent(userFound.u);
            window.location.href = targetUrl;
        } else {
            document.getElementById('error').style.display = "block";
        }
    });
    </script>

</body>
</html>
