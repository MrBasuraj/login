<!DOCTYPE html>
<html lang="en">
    <link rel="stylesheet" href="styles.css">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Succesful Login</title>
    <script>
        // IMMEDIATELY CHECK AUTHENTICATION BEFORE THE PAGE LOADS
        if (sessionStorage.getItem("isLoggedIn") !== "true") {
            // Redirect unauthorized users back to the login page
            window.location.href = "index.html";
        }
    </script>
    <style>
    body {
        margin: 0;
        min-height: 100vh;
        min-height: 100dvh;
        background-color: #ff003c; /* अपना रेड कलर कोड यहाँ डालें */
        
        display: flex;
        flex-direction: column; 
        justify-content: center;
        align-items: center;    
        text-align: center;     
        gap: 20px;            
        padding: 20px;        
        box-sizing: border-box;
    }
</style>

</head>
<body>

   <header><h1 id="greeting">Loading...</h1>

    <script>
        // If they passed the check above, read the name and show the message
        const urlParams = new URLSearchParams(window.location.search);
        const userName = urlParams.get('name');

        if (userName) {
            const formattedName = userName.charAt(0).toUpperCase() + userName.slice(1);
            document.getElementById('greeting').innerText = `Best Wishes, ${formattedName}! ✨`;
        } else {
            document.getElementById('greeting').innerText = "Welcome! ✨";
        }
    </script>
  <h2>Hey Dishant </h2></header>
 <h3 <div class="colorful-header">Greetings From Basuraj</div></h3>
     
 <footer> <h4> Your Login Is Successful </h4>
     
 <h5> please wait…</h5>
     
<h6>  Your Content Is Under Construction</h6></footer>
</body>
</html>
