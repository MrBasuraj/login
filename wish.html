<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Mobile responsive viewport fix -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greetings</title>
    
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            min-height: 100dvh;   /* Dynamic mobile height fix */
            background-color: #0af7b4; /* Your exact crimson red color */
            
            /* Clean structural vertical layout grid/flexbox */
            display: flex;
            flex-direction: column; 
            justify-content: center;
            align-items: center;    
            text-align: center;     
            
            gap: 20px;            /* Uniform spacing between text rows */
            padding: 20px;        /* Safety layout gutter margin */
            box-sizing: border-box;
            
            font-family: sans-serif; 
            color: white; 
        }

        /* Classes to style individual text elements */
        .wishes { color: #000000; font-weight: bold; }
        .hey { color: #000000; font-weight: bold; }
        .greetings { color: #000000; font-weight: bold; font-size: 1.2rem; }
        .status { color: #330000; boldfont-size: 0.9rem; max-width: 300px; }
    </style>
</head>
<!-- Unique Instagram Button for the logged-in user -->
<a id="instaButton" href="#" target="_blank" style="display: inline-block; background: linear-gradient(45deg, #f09433, #dc2743, #cc2366, #bc1888); color: white; padding: 12px 24px; text-decoration: none; border-radius: 25px; font-weight: bold; margin-top: 15px; font-size: 0.9rem; box-shadow: 0 4px 10px rgba(0,0,0,0.2);">
    📸 Visit My Instagram
</a>

    <body>

    <!-- Dynamic text elements that adjust per login credentials -->
    <div class="wishes" id="wishesBlock">Best Wishes, User! ✨</div>
    <div class="hey" id="heyBlock">Hey User</div>
    <div class="greetings">Greetings From Basuraj
    Your Login is Successful please wait... Your Content is Under Construction

    <script>
 // Extract the logged-in user name from the URL string
    const urlParams = new URLSearchParams(window.location.search);
    let username = urlParams.get('name');

    // Default fallback structural backup name handling
    if (!username) {
        username = "Guest";
    }

    // Explicitly update individual text blocks with current logged-in name
    document.getElementById('wishesBlock').innerText = "Best Wishes, " + username + "! ✨";
    document.getElementById('heyBlock').innerText = "Hey " + username;
    </script>
</body>
</html>
